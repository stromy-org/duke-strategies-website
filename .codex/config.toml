#:schema https://developers.openai.com/codex/config-schema.json

# Codex project configuration
# AGENTS.md is auto-loaded as primary instructions.

# ── Instructions ───────────────────────────────────────────
# If AGENTS.md is missing, try CLAUDE.md or GEMINI.md
project_doc_fallback_filenames = ["CLAUDE.md", "GEMINI.md"]

# ── Approval & Sandbox ────────────────────────────────────
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# ── Reasoning ──────────────────────────────────────────────
model_reasoning_effort = "high"

# ── Web Search ─────────────────────────────────────────────
web_search = "cached"

[agent]
model = "o4-mini"

# ── MCP Servers ────────────────────────────────────────────
# Declare [mcp_servers.*] entries here directly. Keep in sync with
# .mcp.json / .gemini/settings.json / .agents/mcp.json by hand.
