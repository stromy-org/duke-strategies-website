name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  astro-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run tokens
      - run: npm run check
      - run: npm run build
      - name: Internal-link + asset integrity (WS3.1)
        run: npm run check:links
      - name: i18n key integrity (WS3.2)
        run: npm run check:i18n
      - name: Smoke test built site
        run: |
          npx --yes serve -s dist -l 4321 &
          server_pid=$!
          for _ in $(seq 1 15); do
            curl -sf http://localhost:4321/ >/dev/null && break
            sleep 1
          done
          body="$(curl -sf http://localhost:4321/)"
          kill "$server_pid" 2>/dev/null || true
          test -n "$body" || { echo "homepage returned no body"; exit 1; }
